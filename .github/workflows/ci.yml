name: CI Hospital Management

on: [push, pull_request]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos al Wrapper
        run: chmod +x mvnw

      - name: Compilar proyecto
        run: ./mvnw compile --no-transfer-progress

      - name: Ejecutar Tests de Integracion
        run: ./mvnw verify --no-transfer-progress

      - name: Generar Informe de Resultados
        if: always() 
        uses: dorny/test-reporter@v1
        with:
          name: Informe de Pruebas de Integracion
          path: target/failsafe-reports/*.xml
          reporter: java-junit

      - name: Generar Badge de Cobertura (Jacoco)
        if: github.event_name != 'pull_request'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges

      - name: Commit y Push del badge
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/badges/*.svg
          git commit -m "Autodocumentacion: Actualizar badge de Jacoco" || exit 0
          git push