name: CI Hospital Management

on: [push, pull_request]

permissions:
  contents: write  # Para subir el badge dinámico de Jacoco
  checks: write    # Para que el reporte de tests funcione
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos al Wrapper
        run: chmod +x mvnw

      - name: Compilar proyecto
        run: ./mvnw compile --no-transfer-progress

      - name: Ejecutar Tests e Informe Jacoco
        # Ejecutamos verify para los tests de integración y generamos el reporte
        run: ./mvnw verify jacoco:report --no-transfer-progress --batch-mode

      - name: Generar Informe de Resultados (Reporter)
        if: always() # Se ejecuta siempre para ver qué falló
        uses: dorny/test-reporter@v1
        with:
          name: Informe de Pruebas de Integracion
          path: 'target/failsafe-reports/*.xml'
          reporter: java-junit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar Badge de Cobertura (Jacoco)
        if: github.event_name != 'pull_request'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges

      - name: Commit y Push del badge dinamico
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/badges/*.svg
          git commit -m "Autodocumentacion: Actualizar badge de cobertura" || exit 0
          git push